services:
  - type: web
    name: cloudvigil
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: PING_CRON
        value: "*/30 * * * * *"
      - key: AXIOS_TIMEOUT_MS
        value: "10000"
